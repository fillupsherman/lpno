<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Leftist-Progressive Night Out!</title>
    <link rel="stylesheet" href="/css/site.css">
  <link rel="stylesheet" href="/css/plasma.css">
  </head>
  <body>
    <header class="site-header">
      <div class="wrap header-grid">
        <span class="brand label">
          <a href="/index" aria-label="Home">
            <img src="/assets/images/lpno.png" alt="LPNO logo" class="logo" />
          </a>
        </span>
        <h1 class="title">Leftist-Progressive Night Out!</h1>

        <nav class="nav-desktop">
          <a href="/index"><span class="label">Events</span></a>
          <a href="/subscribe"><span class="label">Mailing List</span></a>
          <a href="/volunteer.html"><span class="label">Volunteer</span></a>
          <a href="/donate.html"><span class="label">Donate</span></a>
          <a href="/chapters.html"><span class="label">Chapters</span></a>
          <a href="/about.html"><span class="label">About</span></a>
        </nav>
      </div>
    </header>

    <main class="wrap">
        <section class="description">
            <h2>Existing Chapters</h2>
            <div id="chapters" class="chapters"></div>
        </section>

        <article class="card">
            <div class="content">
              <h2 class="name">Start a New Chapter</h2>
              <p class="desc">Tell us where you are and how to contact you.</p>
            </div>
            <form
                class="form"
                action="https://formspree.io/f/mkogdpnr"
                method="POST"
                style="flex-direction:column; gap:10px;"
            >
                <input class="email-form" type="email" name="email" placeholder="Email" required />

                <input class="email-form" name="first_name" placeholder="First name" required />
                <input class="email-form" name="middle_name" placeholder="Middle name" required />
                <input class="email-form" name="last_name" placeholder="Last name" required />

                <input class="email-form" name="twitter" placeholder="Twitter / X (optional)" />
                <input class="email-form" name="instagram" placeholder="Instagram (optional)" />
                <input class="email-form" name="bluesky" placeholder="Bluesky (optional)" />
                <input class="email-form" name="facebook" placeholder="Facebook (optional)" />
                <input class="email-form" name="links" placeholder="Other socials or links (optional)" />

                <textarea
                    class="email-form" 
                    name="message"
                    placeholder="Anything you'd like to tell us"
                    rows="4"
                    style="resize:vertical"
                ></textarea>

                <!-- spam honeypot -->
                <input type="text" name="_gotcha" style="display:none">

                <input type="hidden" name="_subject" value="New Chapter Application">

                <button class="btn email-form">Apply</button>
            </form>

        </article>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <footer>
      <small>© 2025 Leftist-Progressive Night Out!</small>
    </footer>

        <script>
            async function loadChapters() {
                const res = await fetch('/data/chapters.json');
                const chapters = await res.json();
                const el = document.getElementById('chapters');

                el.innerHTML = chapters.map(c => `
                    <h2>
                      <a class="gradient-underline" href="${c.events_url}">
                        ${c.name}
                      </a>
                    </h2>
                `).join('');
            }
            loadChapters();
        </script>
    </body>
</html>
