name = "lpno"
main = "index.js"
compatibility_date = "2025-07-24"         # today

[[kv_namespaces]]
binding = "RSVPS"
id = "4924fad62cc04932a8d8ae14d4433a19"
preview_id = "3f07589fa5ab4d44963ab8726eb51d00"

[[kv_namespaces]]
binding = "SUBSCRIBERS"
id = "9482c623fa344fd0b04e0420d1688e8f"

[[kv_namespaces]]
binding = "VOLUNTEERS"
id = "b6ff7bd529844350a27f8e297118dc02"

[[kv_namespaces]]
binding = "SUPPLY_DONATIONS"
id = "a4df24b046124b0a870f82c269450586"

[vars]
GROUP_URLNAME = "leftist-progressive-night-out"      # will be overridden in dashboard
FB_PAGE_ID = "973240759199799"                           # set your Facebook Page ID here

# Secrets (set via: wrangler secret put FB_PAGE_ACCESS_TOKEN)
#   FB_PAGE_ACCESS_TOKEN  — Long-lived Page Access Token with pages_manage_events + pages_read_engagement
#   ADMIN_KEY             — Secret key for the manual GET /sync trigger endpoint

[triggers]
crons = ["0 12 * * *"]                    # runs daily at noon UTC; adjust as needed
